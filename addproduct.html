            --bg-body: #fdf2f5;

            --card-white: #ffffff;

        }

        body {
            font-family: 'Poppins', sans-serif;

        /* --- Fixed Navbar Structure --- */
        .navbar {
            background-color: var(--nav-bg);

        .navbar-brand {
            font-family: 'Lobster', cursive;
            font-size: 1.8rem;
            color: var(--accent-pink) !important;
            margin: 0;
            padding: 0;
        }

        .nav-status {
            border-left: 1px solid #444;
            padding-left: 15px;
            margin-left: 15px;
        }

        .nav-status small {
            color: #ff75a0;

        .main-content {
            margin-top: 50px;
        }

        .form-card {
            width: 100%;
            max-width: 800px; /* Slightly wider to accommodate side-by-side inputs */
            margin: 0 auto;
            background: var(--card-white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(216, 27, 96, 0.05);
            border: 1px solid #fce4ec;
        }

        .form-card h3 {
            color: var(--nav-bg);
            font-weight: 700;
            text-align: center;
        }

        .form-card p {
            font-size: 0.85rem;
            color: var(--label-color);
            text-align: center;
            margin-bottom: 30px;
        }

        .form-label {
            font-weight: 600;
            color: var(--nav-bg);
            font-size: 0.85rem;
        }

        .btn-save {
            background-color: var(--accent-pink);

<body>

<nav class="navbar">
    <div class="container d-flex align-items-center justify-content-between">
        
        <div class="d-flex align-items-center">
            <a class="navbar-brand" href="#">FashionHub</a>
            <div class="nav-status d-none d-md-block">
                <small>System Status</small>
                <span>Administrator</span>
            </div>
        </div>

        <div>
            <a href="admindashboard1.php" class="btn-return">
                &larr; Return to Dashboard
            </a>
        </div>
        
    </div>
</nav>

<div class="container main-content">
    <div class="form-card">
        <form action="addproduct.php" method="post" enctype="multipart/form-data">
            <h3>Add Product</h3>
            <p>List a new item in the FashionHub catalog</p>
            
            <div class="row">
                <div class="col-md-12 mb-3">
                    <label class="form-label">Product Name</label>
                    <input type="text" name="nm1" class="form-control" placeholder="Enter product name" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Price (INR)</label>
                    <div class="input-group">
                        <span class="input-group-text">&#8377;</span>
                        <input type="number" name="nm2" class="form-control price-input" placeholder="599" step="0.01" required>
                    </div>
                </div>


              <div class="col-md-6 mb-3">
              <label class="form-label">Stock Quantity</label>
              <input type="text" name="nm3" class="form-control" placeholder="e.g. 50" required>
                </div>

                <div class="col-md-12 mb-3">
                    <label class="form-label">Category</label>
                    <select name="nm4" class="form-select">
                        <option>Women</option>
                        <option>Kurti</option>
              
                        <option>Men</option>
                        <option>Kids</option>
                        <option>Boys</option>
                        <option>Girls</option>
                        <option>Hand Accessories</option>
                        <option>Jwellary</option>
                        <option>Sarees</option>
                        <option>Makeup</option>
                        <option>Facewash</option>
                        <option>Handbags</option>
                        <option>Necklace</option>
                        <option>Earrings</option>
                        <option>Women Footwear</option>
                        <option>Men Footwear</option>
                        <option>Watch</option>
                        <option>Perfume</option>
                        <option>Sweater</option>
                        <option>Digital Accessories</option>
                    </select>
                </div>

                <div class="col-md-12 mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="nm5" class="form-control" rows="3" placeholder="Enter product description..."></textarea>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Image 1</label>
                    <input type="file" name="nm6" class="form-control">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Image 2</label>
                    <input type="file" name="nm7" class="form-control">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Image 3</label>
                    <input type="file" name="nm8" class="form-control">
                </div>
            </div>

            <button type="submit" class="btn btn-save w-100">Add Product</button>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
